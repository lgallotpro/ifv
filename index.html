<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Accès cartographie</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    #login-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 320px;
    }

    h1 {
      margin-top: 0;
      font-size: 22px;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    #map-container {
      display: none;
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<div id="login-container">
  <div id="login-box">

    <h1>Accès cartographie</h1>

    <p>Entrez votre code organisme.</p>

    <input
      type="text"
      id="pIdInput"
      placeholder="Ex : E002B"
      autocomplete="off"
    />

    <button onclick="loadExperience()">
      Accéder
    </button>

  </div>
</div>

<div id="map-container">
  <iframe id="experienceFrame"></iframe>
</div>

<script>

function loadExperience() {

  const pId = document
    .getElementById("pIdInput")
    .value
    .trim();

  if (!pId) {
    alert("Veuillez entrer un code.");
    return;
  }

  const experienceUrl =
    "https://experience.arcgis.com/experience/4355ed6e5f5147c3979cd4b8315764d0/page/Mildiou-saison";

  const dataFilter =
    "dataSource_424-19e02bd072b-layer-4:p_id='" + pId + "'";

  const finalUrl =
    experienceUrl +
    "?data_filter=" +
    encodeURIComponent(dataFilter);

  document.getElementById("login-container").style.display = "none";

  document.getElementById("map-container").style.display = "block";

  document.getElementById("experienceFrame").src = finalUrl;
}

document
  .getElementById("pIdInput")
  .addEventListener("keypress", function(event) {

    if (event.key === "Enter") {
      loadExperience();
    }

  });

</script>

</body>
</html>
