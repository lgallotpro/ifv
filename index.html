<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirection ArcGIS</title>

  <script>
    (function () {

      const EXPERIENCE_URL =
        "https://experience.arcgis.com/experience/4355ed6e5f5147c3979cd4b8315764d0/page/Mildiou-saison";

      const DEFAULT_FILTER =
        "dataSource_424-19e02bd072b-layer-4:p_id='E002B'";

      const currentUrl = new URL(window.location.href);

      // Si aucun data_filter présent
      if (!currentUrl.searchParams.has("data_filter")) {

        const redirectUrl = new URL(EXPERIENCE_URL);

        redirectUrl.searchParams.set(
          "data_filter",
          DEFAULT_FILTER
        );

        window.location.replace(redirectUrl.toString());

      } else {

        // Si un data_filter existe déjà, on redirige tel quel vers Experience Builder
        const redirectUrl = new URL(EXPERIENCE_URL);

        currentUrl.searchParams.forEach((value, key) => {
          redirectUrl.searchParams.set(key, value);
        });

        window.location.replace(redirectUrl.toString());
      }

    })();
  </script>

</head>
<body>
</body>
</html>
